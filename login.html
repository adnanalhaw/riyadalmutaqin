<!DOCTYPE html>
<!-- رياض المتقين — تسجيل الدخول (أربعة أدوار) -->
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>تسجيل الدخول — رياض المتقين</title>
<meta name="theme-color" content="#0F1C12">
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="رياض المتقين" class="logo">
      <span class="name">رياض المتقين</span>
    </div>
    <a class="btn btn-sm" href="index.html">الرئيسية</a>
  </header>

  <main>
    <h2 class="center gold" style="margin-top:1.2rem">تسجيل الدخول</h2>
    <p class="center muted small">ادخل إلى حسابك للمتابعة.</p>

    <!-- تبويبات الأدوار -->
    <div class="role-tabs" id="role-tabs">
      <button class="role-tab active" type="button" data-role="student">متعلم</button>
      <button class="role-tab" type="button" data-role="teacher">معلم</button>
      <button class="role-tab" type="button" data-role="admin">مدير الموقع</button>
      <button class="role-tab" type="button" data-role="sysadmin">مدير النظام</button>
    </div>

    <div class="card">
      <label class="fld" for="email">البريد الإلكتروني</label>
      <input type="email" id="email" autocomplete="username" placeholder="example@riyadalmutaqin.com">

      <label class="fld" for="password">كلمة المرور</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">

      <label class="row" style="margin-top:.8rem; gap:.5rem; cursor:pointer">
        <input type="checkbox" id="remember" style="width:auto"> <span class="small">تذكّرني</span>
      </label>

      <button id="login-btn" class="btn btn-gold btn-block" type="button" style="margin-top:1rem">دخول</button>
      <p id="auth-msg" class="auth-msg"></p>
    </div>

    <div class="card" style="margin-top:.9rem">
      <p class="small muted center">💚 اللهمّ صلِّ وسلّم على نبيّنا محمد ﷺ — «من صلّى عليّ واحدةً صلّى الله عليه بها عشرًا.»</p>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
  let selectedRole = "student";
  // اختيار الدور من رابط ?role=... إن وُجد
  const urlRole = new URLSearchParams(location.search).get("role");
  if (ROLES[urlRole]) selectedRole = urlRole;

  document.querySelectorAll(".role-tab").forEach((tab) => {
    tab.classList.toggle("active", tab.dataset.role === selectedRole);
    tab.addEventListener("click", () => {
      selectedRole = tab.dataset.role;
      document.querySelectorAll(".role-tab").forEach((t) => t.classList.toggle("active", t === tab));
    });
  });

  async function doLogin() {
    const msg = document.getElementById("auth-msg");
    msg.className = "auth-msg"; msg.textContent = "جارٍ التحقق…";
    const res = await login(
      document.getElementById("email").value,
      document.getElementById("password").value,
      selectedRole,
      document.getElementById("remember").checked,
    );
    if (!res.ok) { msg.className = "auth-msg err"; msg.textContent = res.error; return; }
    location.href = "dashboard.html";
  }
  document.getElementById("login-btn").addEventListener("click", doLogin);
  document.getElementById("password").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

  // مسجّل الدخول سلفاً؟ → مباشرة للوحة
  if (getSession()) location.href = "dashboard.html";
</script>
</body>
</html>
